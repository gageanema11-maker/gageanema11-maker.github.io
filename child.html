<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* fills window */
  }
</style>
</head>

<body>

<img src="You_Are_An_Idiot_screen.gif" alt="gif">

<script>
window.addEventListener("beforeunload", () => {
  if (window.opener) {
    window.opener.postMessage("childClosed", "*");
  }
});
</script>

</body>
</html>
